name: Deploy Spring Boot Backend to Amazon Linux EC2 (Dev)

on:
  push:
    branches: [ "master" ] # Triggered on pushes to master

jobs:
  # ==========================================
  # STAGE 1: Build Application with JDK 25
  # ==========================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Executable JAR
        run: ./gradlew bootJar -x test

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soldier-backend-jar
          path: build/libs/*.jar

  # ==========================================
  # STAGE 2: Deploy to Amazon Linux EC2
  # ==========================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download Built JAR
        uses: actions/download-artifact@v4
        with:
          name: soldier-backend-jar
      - name: Rename JAR to app.jar
        run: |
          mv *.jar app.jar
      - name: Copy JAR to Amazon Linux EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          source: "app.jar"
          target: "/home/ec2-user/app/"

      - name: Restart Service via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            sudo systemctl restart soldier-game
            sudo systemctl status soldier-game --no-pager